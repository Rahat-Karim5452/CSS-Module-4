<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            border-collapse: collapse;
        }
        th{
            background-color: yellowgreen;
        }

        }

</head>

                <tr>

                </tr>
                <tr>
                    <td>2019</td>

                    <td>2019</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="3">by fifa </td>

            </tfoot>
           </thead>
        </table>
    </main>
</body>
</html>
